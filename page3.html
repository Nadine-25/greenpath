<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPath – Questionnaire</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="confetti-container" id="confetti"></div>
    <!-- OVERLAY -->
    <div id="thankyou-overlay">
        <div class="thankyou-card-wrapper">
            <div class="card thankyou-card">
                <div class="check-ring">
                    <svg viewBox="0 0 50 50">
                        <polyline points="10,26 21,37 40,14" />
                    </svg>
                </div>
                <h2 class="overlay-title">Reponses sauvegardees !</h2>
                <p class="overlay-text">
                    Tes preferences de recompenses ont ete notees.<br>
                    Tu peux continuer ou t'arreter ici.
                </p>
                <div class="action-buttons">
                    <a href="page4.html" class="action-btn btn-continue">
                        <i class="fa-solid fa-arrow-right"></i> Continuer
                    </a>
                    <button class="action-btn btn-done" onclick="closeOverlay()">
                        <i class="fa-solid fa-check"></i> Termine
                    </button>
                    <button class="action-btn btn-quit" onclick="quitApp()">
                        <i class="fa-solid fa-right-from-bracket"></i> Quitter
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE -->
    <div class="page-wrapper">
        <div class="header">
            <div class="logo-area">
                <img id="mascot_sleeping" alt="mascot" src="mascot_sleeping.png">
                <h1 class="app-title">GreenPath</h1>
            </div>
            <p class="app-subtitle"><i class="fa-solid fa-leaf"></i> Ton jardin virtuel t'attend !</p>
        </div>

        <div class="progress-container">
            <div class="progress-label">
                <span>Page 3 / 7</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" style="width:42%;"></div>
            </div>
        </div>

        <div class="card">
            <div class="section-header">
                <i class="fa-solid fa-tree section-icon"></i>
                <div class="section-number">3</div>
                <h2 class="section-title">Systeme de recompenses</h2>
            </div>
            <p class="section-desc">Le jardin virtuel – est-ce que ca te motive vraiment ?</p>

            <!-- Q6 -->
            <div class="question-group">
                <label class="question-label">
                    <span class="question-num">6</span>
                    L'idee de construire un jardin virtuel en recompense de vos efforts vous motive-t-elle ?
                </label>
                <div class="options-grid">
                    <div class="option-item">
                        <input type="radio" name="jardin_motiv" id="jard1" value="Beaucoup">
                        <label class="option-label" for="jard1">
                            <i class="fa-solid fa-tree option-icon"></i> Beaucoup, j'adore l'idee !
                        </label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="jardin_motiv" id="jard2" value="Moyennement">
                        <label class="option-label" for="jard2">
                            <i class="fa-solid fa-seedling option-icon"></i> Moyennement
                        </label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="jardin_motiv" id="jard3" value="Pas vraiment">
                        <label class="option-label" for="jard3">
                            <i class="fa-solid fa-leaf option-icon"></i> Pas vraiment
                        </label>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Q7 -->
            <div class="question-group">
                <label class="question-label">
                    <span class="question-num">7</span>
                    Seriez-vous motive(e) par un systeme de monnaie virtuelle (coins) ?
                </label>
                <div class="options-grid">
                    <div class="option-item">
                        <input type="radio" name="coins_motiv" id="coins_oui" value="Oui">
                        <label class="option-label" for="coins_oui">
                            <i class="fa-solid fa-coins option-icon"></i> Oui !
                        </label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="coins_motiv" id="coins_non" value="Non">
                        <label class="option-label" for="coins_non">
                            <i class="fa-solid fa-ban option-icon"></i> Non
                        </label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="coins_motiv" id="coins_si" value="Seulement si utile">
                        <label class="option-label" for="coins_si">
                            <i class="fa-solid fa-circle-question option-icon"></i> Seulement si vraiment utile
                        </label>
                    </div>
                </div>
            </div>

            <div class="nav-buttons-triple">
                <a href="page2.html" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Retour
                </a>
                <button class="btn-validate" id="validateBtn" onclick="validateForm(event)">
                    <i class="fa-solid fa-check"></i> Valider
                </button>
                <a href="page4.html" class="btn btn-primary" onclick="saveAndNext(event,'page4.html')">
                    Suivant <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>

        <div class="page-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script src="shared.js"></script>
</body>

</html>

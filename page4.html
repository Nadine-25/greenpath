<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPath – Questionnaire</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="confetti-container" id="confetti"></div>

    <!-- OVERLAY -->
    <div id="thankyou-overlay">
        <div class="thankyou-card-wrapper">
            <div class="card thankyou-card">
                <div class="check-ring">
                    <svg viewBox="0 0 50 50">
                        <polyline points="10,26 21,37 40,14" />
                    </svg>
                </div>
                <h2 class="overlay-title">Reponses sauvegardees !</h2>
                <p class="overlay-text">
                    Tes stats ont bien ete enregistrees.<br>
                    Tu peux continuer ou t'arreter ici.
                </p>
                <div class="action-buttons">
                    <a href="page5.html" class="action-btn btn-continue">
                        <i class="fa-solid fa-arrow-right"></i> Continuer
                    </a>
                    <button class="action-btn btn-done" onclick="closeOverlay()">
                        <i class="fa-solid fa-check"></i> Termine
                    </button>
                    <button class="action-btn btn-quit" onclick="quitApp()">
                        <i class="fa-solid fa-right-from-bracket"></i> Quitter
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE -->
    <div class="page-wrapper">
        <div class="header">
            <div class="logo-area">
                <img id="mascot_sleeping" alt="mascot" src="mascot_sleeping.png">
                <h1 class="app-title">GreenPath</h1>
            </div>
            <p class="app-subtitle"><i class="fa-solid fa-chart-bar"></i> Suivi et statistiques RPG</p>
        </div>

        <div class="progress-container">
            <div class="progress-label">
                <span>Page 4 / 7</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" style="width:56%;"></div>
            </div>
        </div>

        <div class="card">
            <div class="section-header">
                <i class="fa-solid fa-chart-line section-icon"></i>
                <div class="section-number">4</div>
                <h2 class="section-title">Suivi et statistiques</h2>
            </div>
            <p class="section-desc">Valide le systeme de stats facon RPG !</p>

            <div class="divider"></div>

            <!-- Q8 -->
            <div class="question-group">
                <label class="question-label">
                    <span class="question-num">8</span>
                    Aimeriez-vous voir des graphiques de votre progression ?
                </label>
                <div class="options-grid">
                    <div class="option-item">
                        <input type="radio" name="graphiques" id="g_oui" value="Oui j'adore les stats">
                        <label class="option-label" for="g_oui">
                            <i class="fa-solid fa-chart-line option-icon"></i> Oui, j'adore les stats !
                        </label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="graphiques" id="g_simples" value="Seulement simples">
                        <label class="option-label" for="g_simples">
                            <i class="fa-solid fa-chart-simple option-icon"></i> Seulement des graphiques simples
                        </label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="graphiques" id="g_non" value="Non pas besoin">
                        <label class="option-label" for="g_non">
                            <i class="fa-solid fa-ban option-icon"></i> Non, pas besoin
                        </label>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Q9 -->
            <div class="question-group">
                <label class="question-label">
                    <span class="question-num">9</span>
                    Trouvez-vous motivant de voir l'impact direct de vos actions sur vos statistiques ?
                </label>
                <div class="options-grid">
                    <div class="option-item">
                        <input type="radio" name="impact_stats" id="imp1" value="Oui beaucoup">
                        <label class="option-label" for="imp1">
                            <i class="fa-solid fa-fire option-icon"></i> Oui, beaucoup !
                        </label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="impact_stats" id="imp2" value="Moyennement">
                        <label class="option-label" for="imp2">
                            <i class="fa-solid fa-face-meh option-icon"></i> Moyennement
                        </label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="impact_stats" id="imp3" value="Non ca ne change rien">
                        <label class="option-label" for="imp3">
                            <i class="fa-solid fa-ban option-icon"></i> Non, ca ne change rien
                        </label>
                    </div>
                </div>
            </div>

            <div class="nav-buttons-triple">
                <a href="page3.html" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Retour
                </a>
                <button class="btn-validate" id="validateBtn" onclick="validateForm(event)">
                    <i class="fa-solid fa-check"></i> Valider
                </button>
                <a href="page5.html" class="btn btn-primary" onclick="saveAndNext(event,'page5.html')">
                    Suivant <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>

        <div class="page-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script src="shared.js"></script>
</body>

</html>
